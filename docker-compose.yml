services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PRELOAD_MODEL: ${PRELOAD_MODEL:-false}
    container_name: api-similaridade
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATA_DIR: ${DATA_DIR:-/app/data}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-*}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web-similaridade
    environment:
      API_BASE_URL: ${API_BASE_URL:-}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

